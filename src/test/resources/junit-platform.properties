cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=3
cucumber.execution.parallel.config.fixed.max-pool-size=3
cucumber.glue=com.shirkhan.stepDefinitions, com.shirkhan.base
cucumber.plugin=pretty, html:target/cucumber-report.html, json:target/cucumber.json, junit:target/surefire-reports/TEST-cucumber.xml
cucumber.filter.tags=@saucedemo or @smoke or @regression
cucumber.execution.dry-run=false
