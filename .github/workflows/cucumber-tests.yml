name: Saucedemo BDD Tests

on:
  push:
    branches: [ master, main ]
    paths:
      - 'src/test/java/com/shirkhan/stepDefinitions/**'
      - 'src/test/resources/features/**'
      - 'src/test/java/com/shirkhan/pages/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'src/test/java/com/shirkhan/stepDefinitions/**'
      - 'src/test/resources/features/**'
      - 'src/test/java/com/shirkhan/pages/**'
  workflow_dispatch:
    inputs:
      test_tags:
        description: 'Test tags to run (default: @saucedemo)'
        required: false
        default: '@saucedemo'

jobs:
  cucumber-tests:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        
    - name: Install Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: latest
        
    - name: Install ChromeDriver
      uses: nanoufo/action-setup-chromedriver@v1
      with:
        chromedriver-version: latest
        
    - name: Run Cucumber tests
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 3
        mvn test -Dtest=TestRunner -Dcucumber.options="--tags=@saucedemo" -Dmaven.test.failure.ignore=true || echo "Tests completed with some failures"
        echo "Test execution completed with exit code: $?"
      env:
        GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
        
    - name: Generate Cucumber Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cucumber-reports
        path: |
          target/surefire-reports/
          target/cucumber/
          target/cucumber-report.html
          target/cucumber.json
          
    - name: Publish Cucumber Report
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./target/cucumber
        destination_dir: cucumber-reports
